<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Ansh Shah - Full Stack Developer Portfolio" />
  <title>Ansh Shah - Full Stack Developer</title>

  <!-- Preconnect & Preload -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" as="style">

  <!-- Tailwind CDN + Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Tailwind Config (your exact beautiful theme) -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        container: { center: true, padding: "2rem", screens: { "2xl": "1400px" } },
        extend: {
          colors: {
            border: "hsl(var(--border))",
            input: "hsl(var(--input))",
            ring: "hsl(var(--ring))",
            background: "hsl(var(--background))",
            foreground: "hsl(var(--foreground))",
            primary: { DEFAULT: "hsl(var(--primary))", foreground: "hsl(var(--primary-foreground))" },
            secondary: { DEFAULT: "hsl(var(--secondary))", foreground: "hsl(var(--secondary-foreground))" },
            muted: { DEFAULT: "hsl(var(--muted))", foreground: "hsl(var(--muted-foreground))" },
            accent: { DEFAULT: "hsl(var(--accent))", foreground: "hsl(var(--accent-foreground))" },
            destructive: { DEFAULT: "hsl(var(--destructive))", foreground: "hsl(var(--destructive-foreground))" },
            card: { DEFAULT: "hsl(var(--card))", foreground: "hsl(var(--card-foreground))" },
          },
          borderRadius: { lg: "var(--radius)", md: "calc(var(--radius) - 2px)", sm: "calc(var(--radius) - 4px)" },
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          keyframes: {
            "fade-in": { "0%": { opacity: "0", transform: "translateY(10px)" }, "100%": { opacity: "1", transform: "translateY(0)" } },
            "spin-slow": { "0%": { transform: "rotate(0deg)" }, "100%": { transform: "rotate(360deg)" } }
          },
          animation: { "fade-in": "fade-in 0.6s ease-out", "spin-slow": "spin-slow 20s linear infinite" }
        }
      }
    }
  </script>

  <!-- Shadcn-like CSS Variables -->
  <style type="text/tailwindcss">
    @layer base {
      :root {
        --background: 0 0% 100%;
        --foreground: 222.2 84% 4.9%;
        --card: 0 0% 100%;
        --card-foreground: 222.2 84% 4.9%;
        --primary: 222.2 47.4% 11.2%;
        --primary-foreground: 210 40% 98%;
        --secondary: 210 40% 96%;
        --secondary-foreground: 222.2 47.4% 11.2%;
        --muted: 210 40% 96%;
        --muted-foreground: 215.4 16.3% 46.9%;
        --border: 214.3 31.8% 91.4%;
        --radius: 0.5rem;
      }
      .dark {
        --background: 222.2 84% 4.9%;
        --foreground: 210 40% 98%;
        --card: 222.2 84% 4.9%;
        --card-foreground: 210 40% 98%;
        --primary: 210 40% 98%;
        --primary-foreground: 222.2 47.4% 11.2%;
        --secondary: 217.2 32.6% 17.5%;
        --secondary-foreground: 210 40% 98%;
        --muted: 217.2 32.6% 17.5%;
        --muted-foreground: 215 20.2% 65.1%;
        --border: 217.2 32.6% 17.5%;
      }
      body { @apply bg-background text-foreground min-h-screen; font-feature-settings: "rlig" 1, "calt" 1; -webkit-font-smoothing: antialiased; }
    }
  </style>

  <!-- Reliable Import Map (React 18 + esm.sh) -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom": "https://esm.sh/react-dom@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "lucide-react": "https://esm.sh/lucide-react@0.469.0"
    }
  }
  </script>
</head>

<body class="transition-colors duration-300">

  <div id="root"></div>

  <!-- Main App (React 18 + JSX works perfectly) -->
  <script type="module">
    import React from 'react';
    import ReactDOM from 'react-dom/client';
    import { Moon, Sun, Code2, Mail, Github, Linkedin, ExternalLink } from 'lucide-react';

    function App() {
      const [darkMode, setDarkMode] = React.useState(false);

      React.useEffect(() => {
        if (darkMode) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      }, [darkMode]);

      return (
        <>
          {/* Dark Mode Toggle */}
          <button
            onClick={() => setDarkMode(!darkMode)}
            className="fixed top-6 right-6 z-50 p-3 rounded-full bg-secondary text-secondary-foreground hover:bg-accent transition-all hover:scale-110 shadow-lg"
            aria-label="Toggle dark mode"
          >
            {darkMode ? <Sun className="w-5 h-5" /> : <Moon className="w-5 h-5" />}
          </button>

          {/* Hero Section */}
          <div className="min-h-screen flex items-center justify-center relative overflow-hidden px-6">
            <div className="absolute inset-0 -z-10">
              <div className="absolute inset-0 bg-gradient-to-br from-primary/5 via-transparent to-primary/5 dark:from-primary/10" />
            </div>

            <div className="text-center max-w-4xl mx-auto animate-fade-in">
              <h1 className="text-5xl md:text-7xl font-bold mb-6 bg-clip-text text-transparent bg-gradient-to-r from-primary to-primary/60">
                Ansh Shah
              </h1>
              <p className="text-2xl md:text-4xl font-light text-muted-foreground mb-8">
                Full Stack Developer
              </p>
              <p className="text-lg md:text-xl text-muted-foreground max-w-2xl mx-auto mb-12 leading-relaxed">
                Building modern, fast, and beautiful web experiences with React, Node.js, TypeScript, and cutting-edge tools.
              </p>

              <div className="flex gap-4 justify-center flex-wrap">
                <a href="mailto:hello@anshshah.dev" className="inline-flex items-center gap-2 px-6 py-3 bg-primary text-primary-foreground rounded-lg hover:shadow-xl transition-all hover:scale-105">
                  <Mail className="w-5 h-5" /> Get in Touch
                </a>
                <a href="https://github.com/yourusername" target="_blank" className="inline-flex items-center gap-2 px-6 py-3 border border-border rounded-lg hover:bg-accent transition-all hover:scale-105">
                  <Github className="w-5 h-5" /> GitHub
                </a>
                <a href="https://linkedin.com/in/yourusername" target="_blank" className="inline-flex items-center gap-2 px-6 py-3 border border-border rounded-lg hover:bg-accent transition-all hover:scale-105">
                  <Linkedin className="w-5 h-5" /> LinkedIn
                </a>
              </div>

              <div className="mt-16 flex justify-center">
                <div className="flex items-center gap-3 text-muted-foreground">
                  <Code2 className="w-6 h-6 animate-spin-slow" />
                  <span>Currently crafting amazing things...</span>
                </div>
              </div>
            </div>
          </div>

          {/* Simple Footer */}
          <footer className="py-12 text-center text-sm text-muted-foreground border-t border-border/50">
            <p>© 2025 Ansh Shah. Built with React, Tailwind & love.</p>
          </footer>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
